name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-server.yml"
  workflow_call: # called by deploy-all.yml
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: payslips-maker-server
  ECS_CLUSTER: payslips-maker
  ECS_SERVICE: payslips-server
  ECS_TASK_DEFINITION: payslips-server  # task definition family name in AWS
  CONTAINER_NAME: payslips-server       # container name inside the task definition

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC auth with AWS
      contents: read

    steps:
      - uses: actions/checkout@v4

      # AWS auth via OIDC — no long-lived access keys needed.
      # Setup: create an IAM role with a trust policy for this repo and set
      # the role ARN as secret AWS_ROLE_ARN.
      # Required permissions: ecr:*, ecs:UpdateService, ecs:DescribeTaskDefinition,
      #   ecs:RegisterTaskDefinition, ecs:DescribeServices, iam:PassRole
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f server/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render updated task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy updated task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
